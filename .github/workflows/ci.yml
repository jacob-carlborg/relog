name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

env:
  MACOSX_DEPLOYMENT_TARGET: '11.0'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - if: env.ACT
        run: apt update && apt install cargo

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          tag: github.ref_name
        run: |
          version="${tag#v}"
          crate=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "relog") | .version')
          if [[ "$version" != "$crate" ]]; then
            echo "tag '$version' does not match Cargo.toml version '$crate'" >&2
            exit 1
          fi

      - run: cargo test --locked

  build-native:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: native musl (fully static)
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          # macOS
          - name: macos-x86_64
            runner: macos-26-intel
            target: x86_64-apple-darwin
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          # Windows
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - name: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Add Rust target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify binary is fully static
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/relog"
          file "$bin"
          if file "$bin" | grep -qE 'dynamically linked'; then
            echo "::error::binary is dynamically linked" >&2
            exit 1
          fi
          if ! file "$bin" | grep -qE 'statically linked|static-pie linked'; then
            echo "::error::binary is not statically linked" >&2
            exit 1
          fi
          if readelf -l "$bin" | grep -q 'INTERP'; then
            echo "::error::binary has dynamic interpreter" >&2
            readelf -l "$bin" >&2
            exit 1
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          name="relog-v${version}-${{ matrix.name }}"
          bin_name="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "relog") | .targets[]  | select(.kind[] | contains("bin")) | .name')"
          src="target/${{ matrix.target }}/release/${bin_name}"

          mkdir -p "dist/${name}"
          cp "$src" "dist/${name}/"
          [[ -f readme.md ]] && cp readme.md "dist/${name}/" || true
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"

          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          fi

      - &attach_release
        name: Attach to draft release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          tag: github.ref_name
        shell: bash
        run: |
          set -euo pipefail
          state=$(gh release view "$tag" --json isDraft --jq '.isDraft' 2>/dev/null || echo missing)
          case "$state" in
            false)
              echo "::error::release $tag exists but is not a draft" >&2
              exit 1
              ;;
            true)
              gh release upload "$tag" dist/*.tar.gz dist/*.sha256 --clobber
              ;;
            missing)
              gh release create "$tag" \
                --title "$tag" \
                --draft \
                --generate-notes \
                dist/*.tar.gz dist/*.sha256
              ;;
          esac

  build-qemu:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm
            docker_platform: linux/arm/v7
          - name: linux-x86
            docker_platform: linux/386
          - name: linux-riscv64
            docker_platform: linux/riscv64
          - name: linux-ppc64le
            docker_platform: linux/ppc64le
          - name: linux-s390x
            docker_platform: linux/s390x
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: ${{ matrix.docker_platform }}

      - name: Build in Alpine container under QEMU
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e RUSTFLAGS="-C target-feature=+crt-static" \
            -e CARGO_TERM_COLOR=always \
            --platform ${{ matrix.docker_platform }} \
            alpine:edge \
            sh -c '
              set -eu
              apk add --no-cache build-base rust cargo
              cargo build --release --locked
            '

      - name: Verify binary is fully static
        shell: bash
        run: |
          set -euo pipefail
          bin="target/release/relog"
          file "$bin"
          if file "$bin" | grep -qE 'dynamically linked'; then
            echo "::error::binary is dynamically linked" >&2
            exit 1
          fi
          if ! file "$bin" | grep -qE 'statically linked|static-pie linked'; then
            echo "::error::binary is not statically linked" >&2
            exit 1
          fi
          if readelf -l "$bin" | grep -q 'INTERP'; then
            echo "::error::binary has dynamic interpreter" >&2
            readelf -l "$bin" >&2
            exit 1
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          name="relog-v${version}-${{ matrix.name }}"

          mkdir -p "dist/${name}"
          cp "target/release/relog" "dist/${name}/"
          [[ -f readme.md ]] && cp readme.md "dist/${name}/" || true
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")

      - *attach_release

  build-vm:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # OpenBSD
          - name: openbsd-7.8-x86_64
            vm_os: openbsd
            vm_version: '7.8'
            vm_arch: x86-64
          - name: openbsd-7.8-arm64
            vm_os: openbsd
            vm_version: '7.8'
            vm_arch: arm64
          # FreeBSD
          - name: freebsd-15.0-x86_64
            vm_os: freebsd
            vm_version: '15.0'
            vm_arch: x86-64
          - name: freebsd-15.0-arm64
            vm_os: freebsd
            vm_version: '15.0'
            vm_arch: arm64
          - name: freebsd-14.0-x86_64
            vm_os: freebsd
            vm_version: '14.0'
            vm_arch: x86-64
          - name: freebsd-14.0-arm64
            vm_os: freebsd
            vm_version: '14.0'
            vm_arch: arm64
          # NetBSD
          - name: netbsd-10.0-x86_64
            vm_os: netbsd
            vm_version: '10.0'
            vm_arch: x86-64
          - name: netbsd-10.0-arm64
            vm_os: netbsd
            vm_version: '10.0'
            vm_arch: arm64
          - name: netbsd-9.4-x86_64
            vm_os: netbsd
            vm_version: '9.4'
            vm_arch: x86-64
          # DragonFlyBSD
          - name: dragonflybsd-6.4.2-x86_64
            vm_os: dragonflybsd
            vm_version: '6.4.2'
            vm_arch: x86-64
          # MidnightBSD
          - name: midnightbsd-4.0.4-x86_64
            vm_os: midnightbsd
            vm_version: '4.0.4'
            vm_arch: x86-64
          # Haiku
          - name: haiku-r1beta5-x86_64
            vm_os: haiku
            vm_version: 'r1beta5'
            vm_arch: x86-64
          # OmniOS
          - name: omnios-r151058-x86_64
            vm_os: omnios
            vm_version: 'r151058'
            vm_arch: x86-64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build in VM
        uses: cross-platform-actions/action@master
        with:
          operating_system: ${{ matrix.vm_os }}
          version: ${{ matrix.vm_version }}
          architecture: ${{ matrix.vm_arch }}
          shell: bash
          sync_files: true
          run: |
            set -e
            case "$(uname -s)" in
              OpenBSD)     sudo pkg_add -I rust ;;
              FreeBSD)     sudo pkg install -y rust ;;
              NetBSD)      sudo pkgin -y install mozilla-rootcerts-openssl rust ;;
              DragonFly)   sudo pkg install -y rust ;;
              MidnightBSD) sudo mport install -y rust ;;
              Haiku)       pkgman install -y rust_bin ;;
              SunOS)       sudo pkg install -q rust ;;
              *)           echo "no rust install recipe for $(uname -s)" >&2; exit 1 ;;
            esac
            cargo build --release --locked

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          name="relog-v${version}-${{ matrix.name }}"

          mkdir -p "dist/${name}"
          cp "target/release/relog" "dist/${name}/"
          [[ -f readme.md ]] && cp readme.md "dist/${name}/" || true
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")

      - *attach_release
