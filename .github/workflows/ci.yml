name: CI

on:
  push:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --locked

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          if [[ "$tag" != "$crate" ]]; then
            echo "tag '$GITHUB_REF_NAME' does not match Cargo.toml version '$crate'" >&2
            exit 1
          fi

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify Linux binary is fully static
        if: contains(matrix.target, 'linux')
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/kacr"
          file "$bin"
          if ! file "$bin" | grep -q 'statically linked'; then
            echo "::error::binary is not statically linked" >&2
            exit 1
          fi
          # `ldd` exits non-zero on a static binary; that's the success case.
          if ldd "$bin" 2>&1 | grep -qv 'not a dynamic executable'; then
            echo "::error::binary has dynamic dependencies:" >&2
            ldd "$bin" >&2 || true
            exit 1
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          name="kacr-v${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/kacr" "dist/${name}/"
          cp readme.md "dist/${name}/" 2>/dev/null || true
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          shasum -a 256 "dist/${name}.tar.gz" | awk '{print $1 "  '"${name}.tar.gz"'"}' > "dist/${name}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: kacr-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release with gh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --draft \
            --generate-notes \
            dist/*.tar.gz dist/*.sha256
